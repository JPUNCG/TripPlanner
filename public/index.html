<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Planner | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>
</head>
<body>

    <div id="login-overlay" class="overlay">
        <div id="login-container">
            <div id="login-brand">
                <h1>Trip<span>Planner</span></h1>
                <p>Your ultimate travel companion.</p>
            </div>
            <form id="login-form">
                <h3>Sign in to your account</h3>
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 10px; width: 100%;">Sign In</button>
                <p id="login-error" class="error-text hidden">Invalid credentials. Please try again.</p>
            </form>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header id="main-header">
            <div>
                <h1>Trip<span>Planner</span></h1>
            </div>
            <div id="header-controls">
                <button id="add-trip-btn" class="btn-primary">+ New Trip</button>
                <button id="logout-btn" class="btn-secondary-sm">Log Out</button>
            </div>
        </header>

        <main id="dashboard-container">
            <div id="form-container" class="hidden overlay">
                <form id="trip-form">
                    <h2 id="form-title">Plan New Trip</h2>
                    <div id="form-grid">
                        <input type="text" id="dest-input" placeholder="Destination (e.g. Paris)" required>
                        <input type="url" id="img-input" placeholder="Image URL (Optional)">
                        <div class="date-group">
                            <label>Start Date</label>
                            <input type="date" id="start-input" required>
                        </div>
                        <div class="date-group">
                            <label>End Date</label>
                            <input type="date" id="end-input" required>
                        </div>
                        <input type="text" id="flight-input" placeholder="Flight # (Optional)">
                    </div>
                    <div>
                        <button type="submit" class="btn-primary">Save Trip</button>
                        <button type="button" id="cancel-btn">Cancel</button>
                    </div>
                </form>
            </div>

            <section id="trips-section">
                <div id="trip-grid"></div>
            </section>

            <div id="trip-modal" class="hidden overlay">
                <div id="large-card">
                    <button id="close-modal-btn">&times;</button>
                    <header id="modal-header">
                        <div id="header-actions">
                            <button id="edit-trip-btn" class="btn-secondary-sm">Edit Trip</button>
                            <button id="delete-trip-btn">Delete</button>
                        </div>
                        <div id="header-content">
                            <h2 id="modal-title">Destination</h2>
                            <p id="modal-dates">Dates</p>
                        </div>
                    </header>
                    
                    <div id="modal-body">
                        <div id="dashboard-grid">
                            
                            <div id="left-column">
                                <div class="info-widget" id="weather-container">
                                    <h3>7-Day Forecast</h3>
                                    <div id="weather-widget"></div>
                                </div>
                            </div>

                            <div>
                                <div class="info-widget">
                                    <h3>Travel Notes</h3>
                                    <textarea id="trip-notes" placeholder="Jot down your plans..."></textarea>
                                    <button id="save-notes-btn" class="btn-secondary-sm">Save Notes</button>
                                </div>
                                <div class="info-widget">
                                    <h3> Itinerary & Activities</h3>
                                    <ul id="activities-list"></ul>
                                    <form id="activity-form">
                                        <input type="text" id="act-name" placeholder="Add new activity..." required>
                                        <button type="submit" class="btn-primary">+</button>
                                    </form>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
